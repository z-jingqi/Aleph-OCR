name = "aleph-ocr-gateway"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

[vars]
OCR_ENGINE_URL = "http://127.0.0.1:8090"

# Production secrets:
#   wrangler secret put ALEPH_OCR_API_KEYS
#   wrangler secret put OCR_ENGINE_TOKEN

# Reserved production bindings. Fill IDs during deployment.
# [[d1_databases]]
# binding = "DB"
# database_name = "aleph-ocr"
# database_id = ""

# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "aleph-ocr-assets"

# [[queues.producers]]
# binding = "OCR_JOBS"
# queue = "aleph-ocr-jobs"

# Cloudflare Containers wiring is intentionally documented but not hard-coded here
# until the target account has Containers enabled and its Wrangler schema is confirmed.
# Service name: aleph-ocr-engine
